name = "figma-mcp-relay"
main = "src/index.ts"
compatibility_date = "2024-12-30"
compatibility_flags = ["nodejs_compat"]

[[durable_objects.bindings]]
name = "RELAY"
class_name = "RelayDurableObject"

[[durable_objects.bindings]]
name = "LOOKUP"
class_name = "LookupDurableObject"

[[durable_objects.bindings]]
name = "OAUTH_SESSION"
class_name = "OauthSessionDurableObject"

[[migrations]]
tag = "v1"
new_classes = ["RelayDurableObject", "LookupDurableObject"]

[[migrations]]
tag = "v2"
new_classes = ["OauthSessionDurableObject"]

[vars]
PAIRING_CODE_TTL_MS = "300000"
RPC_TIMEOUT_MS = "30000"
OAUTH_SESSION_TTL_MS = "300000"
OAUTH_CALLBACK_URL = "https://figma-mcp-relay.bromso.workers.dev/oauth/callback"
# OAuth client credentials are placeholders here. Production deployment MUST
# override both via `wrangler secret put FIGMA_OAUTH_CLIENT_ID` and
# `wrangler secret put FIGMA_OAUTH_CLIENT_SECRET` — secrets win over [vars].
# Empty strings would surface E_OAUTH_NOT_CONFIGURED at the /oauth/start route.
FIGMA_OAUTH_CLIENT_ID = "test-client-id"
FIGMA_OAUTH_CLIENT_SECRET = "test-client-secret"
